name: "CI"
on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  python:
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Check out code
        id: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        id: python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        id: uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install Dependencies
        id: deps
        run: uv sync --dev

      - name: Lint
        id: lint
        run: uv run ruff check --preview

      - name: Format
        id: format
        run: uv run ruff format --check --preview

      - name: Type Check
        id: type-check
        run: uv run ty check functions/

      - name: Test
        id: test
        run: uv run coverage run -m pytest

      - name: Coverage Report
        id: coverage
        run: uv run coverage report


  terraform:
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Check out code
        id: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup TFLint
        id: setup-tflint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0
        with:
          tflint_version: v0.59.1

      - name: Init TFLint
        id: init-tflint
        run: tflint --init
        env:
          # Needed to avoid getting rate limited by GitHub API
          GITHUB_TOKEN: ${{ github.token }}

      - name: TFLint
        id: tflint
        run: tflint

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        id: setup-terraform
        with:
          terraform_version: 1.13.5

      - name: Terraform init
        id: init
        run: terraform init

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check

      - name: Terraform validate
        id: validate
        run: terraform validate

      - name: Terraform Docs
        id: terraform-docs
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
