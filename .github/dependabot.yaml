version: 2
updates:
  - package-ecosystem: "terraform"
    directory: "/"
    schedule:
      interval: "daily"
      time: "02:00"
      timezone: "Australia/Melbourne"
    cooldown:
      default-days: 1

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "daily"
      time: "03:00"
      timezone: "Australia/Melbourne"
    groups:
      pytest:
        patterns:
          - "pytest*"
      qa:
        patterns:
          - "ruff*"
          - "ty*"
    cooldown:
      default-days: 1

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "04:00"
      timezone: "Australia/Sydney"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 1
